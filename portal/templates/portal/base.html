<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Primeserve — {{ tenant.name }}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    // Send Django's CSRF token on every htmx-issued request.
    document.addEventListener("htmx:configRequest", (e) => {
      const tok = document.querySelector('meta[name="csrf-token"]');
      if (tok) e.detail.headers["X-CSRFToken"] = tok.content;
    });
  </script>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #666;
      --line: #e4e4e7;
      --bg: #fafafa;
      --accent: #1d4ed8;
      --warn: #b45309;
    }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 720px; margin: 0 auto; padding: 1.5rem; color: var(--fg); background: var(--bg); }
    header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--line); padding-bottom: 0.75rem; margin-bottom: 1.5rem; }
    header h1 { font-size: 1.125rem; margin: 0; }
    header .meta { font-size: 0.875rem; color: var(--muted); }
    main { display: flex; flex-direction: column; gap: 1.5rem; }
    h2 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    label { display: block; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.25rem; }
    input[type=text], input[type=tel] { width: 100%; padding: 0.5rem 0.75rem; font-size: 1rem; border: 1px solid var(--line); border-radius: 4px; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; font-size: 1rem; background: var(--accent); color: white; border: 0; border-radius: 4px; cursor: pointer; }
    button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .card { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 1.25rem; }
    .row { display: flex; justify-content: space-between; padding: 0.25rem 0; }
    .row .label { color: var(--muted); }
    .err { color: var(--warn); font-size: 0.875rem; margin-top: 0.5rem; }
    .stub { color: var(--muted); font-style: italic; }
    .stack > * + * { margin-top: 0.75rem; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
    select { padding: 0.5rem; font-size: 1rem; border: 1px solid var(--line); border-radius: 4px; background: white; }
    input[type=file] { font-size: 0.9rem; }

    /* Recap block above the upload form */
    .recap { background: #f6f5f1; border: 1px solid var(--line); border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.875rem; }
    .recap .label { color: var(--muted); }
    .recap .amount { font-weight: 600; color: var(--fg); }

    /* Status badges */
    .badge { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 0.125rem 0.5rem; border-radius: 999px; line-height: 1.4; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warn { background: #fef3c7; color: #92400e; }
    .badge-error { background: #fee2e2; color: #991b1b; }
    .badge-muted { background: #f3f4f6; color: #4b5563; }

    /* Confidence bar */
    .confbar { display: inline-block; width: 80px; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; vertical-align: middle; margin: 0 0.25rem; }
    .confbar > span { display: block; height: 100%; background: #10b981; }
    .confbar.low > span { background: #f59e0b; }

    /* Evidence list */
    .evidence-list { list-style: none; padding: 0; margin: 0; }
    .evidence-list > li { display: flex; gap: 0.75rem; padding: 0.5rem 0; border-top: 1px solid var(--line); }
    .evidence-list > li:first-child { border-top: 0; }
    .evidence-thumb { width: 64px; height: 64px; flex-shrink: 0; background: #f3f4f6; border-radius: 4px; object-fit: cover; }
    .evidence-thumb-placeholder { width: 64px; height: 64px; flex-shrink: 0; background: #f3f4f6; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }
    .evidence-meta { flex: 1; min-width: 0; }
    .evidence-meta .row1 { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .evidence-meta .row2 { color: var(--muted); font-size: 0.75rem; margin-top: 0.125rem; }
    .evidence-meta .row3 { margin-top: 0.25rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <header>
    <h1>Primeserve <span style="color: var(--muted); font-weight: normal;">— {{ tenant.name }}</span></h1>
    <div class="meta">
      {% if ratepayer %}
        Signed in as {{ ratepayer.full_name }} ·
        <a href="{% url 'portal:logout' %}">Sign out</a>
      {% else %}
        Not signed in
      {% endif %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
